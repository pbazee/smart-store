name: Reservation cleanup (every 5m)

on:
  workflow_dispatch:

jobs:
  call-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Call reservation cleanup endpoint
        env:
          TARGET_URL: ${{ secrets.CRON_TARGET_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$TARGET_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "⚠️  Skipping: Set repository secrets CRON_TARGET_URL (https://<your-app>.vercel.app/api/cron/reservations/cleanup) and CRON_SECRET."
            exit 0
          fi

          curl -fsS -X GET "$TARGET_URL" \
            -H "x-cron-secret: $CRON_SECRET" \
            -w "\nStatus: %{http_code}\n" || true
